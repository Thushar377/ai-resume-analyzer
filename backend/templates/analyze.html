<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyze Job Match - ResumeAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-indigo-900 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard" class="text-2xl font-bold">🤖 ResumeAI</a>
                    <div class="hidden md:flex space-x-6">
                        <a href="/dashboard" class="hover:text-indigo-300">📊 Dashboard</a>
                        <a href="/upload" class="hover:text-indigo-300">📤 Upload</a>
                        <a href="/analyze" class="hover:text-indigo-300 font-bold">🤖 Analyze</a>
                        <a href="/analyses" class="hover:text-indigo-300">📋 History</a>
                    </div>
                </div>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm">
                    🚪 Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="mb-6">
            <h1 class="text-3xl font-bold text-gray-800">🤖 AI Job Matcher</h1>
            <p class="text-gray-600">Paste a job description to see how well your resume matches</p>
        </div>

        <div id="noResumes" class="hidden bg-yellow-100 border border-yellow-400 text-yellow-700 px-6 py-8 rounded-xl text-center">
            <div class="text-5xl mb-3">📄</div>
            <h3 class="text-xl font-bold mb-2">No Resumes Found</h3>
            <p class="mb-4">Upload a resume first to start analyzing</p>
            <a href="/upload" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg">
                Upload Resume
            </a>
        </div>

        <form id="analyzeForm" class="bg-white rounded-xl shadow-lg p-8 space-y-4" style="display: none;">
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Select Resume *</label>
                <select id="resumeSelect" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    <option value="">Choose a resume...</option>
                </select>
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-2">Job Title</label>
                <input type="text" id="jobTitle" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="e.g., Senior Software Engineer">
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-2">Company Name</label>
                <input type="text" id="company" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="e.g., Google">
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-2">
                    Job Description * 
                    <span class="font-normal text-gray-500">(min 50 characters)</span>
                </label>
                <textarea id="jobDescription" rows="10" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="Paste the full job description here..."></textarea>
                <div class="text-right text-sm text-gray-500 mt-1">
                    <span id="charCount">0</span> characters
                </div>
            </div>

            <div id="errorMsg" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded"></div>

            <button type="submit" id="submitBtn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-4 rounded-lg text-lg transition">
                🚀 Analyze Match
            </button>
        </form>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        requireAuth();

        async function loadResumes() {
            try {
                const resumes = await apiCall('/resumes/');
                const processed = resumes.filter(r => r.is_processed);
                
                if (processed.length === 0) {
                    document.getElementById('noResumes').classList.remove('hidden');
                    return;
                }
                
                document.getElementById('analyzeForm').style.display = 'block';
                const select = document.getElementById('resumeSelect');
                processed.forEach(r => {
                    const option = document.createElement('option');
                    option.value = r.id;
                    option.textContent = `${r.original_filename} (${new Date(r.created_at).toLocaleDateString()})`;
                    select.appendChild(option);
                });
                
                if (processed.length > 0) {
                    select.value = processed[0].id;
                }
            } catch (error) {
                showNotification('Failed to load resumes', 'error');
            }
        }

        // Character counter
        document.getElementById('jobDescription').addEventListener('input', (e) => {
            const len = e.target.value.length;
            const counter = document.getElementById('charCount');
            counter.textContent = len;
            counter.className = len < 50 ? 'text-red-500' : 'text-gray-500';
        });

        // Form submit
        document.getElementById('analyzeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMsg');
            
            const jobDesc = document.getElementById('jobDescription').value.trim();
            if (jobDesc.length < 50) {
                errorDiv.textContent = '⚠️ Job description must be at least 50 characters';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '🔄 Analyzing with AI...';
            errorDiv.classList.add('hidden');
            
            try {
                const data = await apiCall('/analyses/', {
                    method: 'POST',
                    body: JSON.stringify({
                        resume_id: parseInt(document.getElementById('resumeSelect').value),
                        job_title: document.getElementById('jobTitle').value || undefined,
                        company_name: document.getElementById('company').value || undefined,
                        job_description: jobDesc
                    })
                });
                
                window.location.href = `/analysis/${data.id}`;
            } catch (error) {
                errorDiv.textContent = '⚠️ ' + error.message;
                errorDiv.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = '🚀 Analyze Match';
            }
        });

        loadResumes();
    </script>
</body>
</html>
